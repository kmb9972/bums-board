<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BUM'S BOARD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ── 미래엔 CI 기반 라이트 팔레트 ───────────────────────── */
:root {
  --mn-orange:   #F26522;   /* 미래엔 대표 오렌지 */
  --mn-orange-d: #D4521A;   /* 눌린 오렌지 */
  --mn-orange-l: #FEF0E8;   /* 오렌지 연한 배경 */
  --mn-navy:     #1A3A5C;   /* 미래엔 네이비 */
  --mn-navy-l:   #E8EEF5;   /* 네이비 연한 배경 */

  --bg:          #F4F5F7;   /* 전체 배경 */
  --bg-white:    #FFFFFF;   /* 카드/사이드바 */
  --bg-row:      #FAFAFA;   /* 줄무늬 행 */
  --border:      #E2E6EA;
  --border-d:    #CBD2D9;

  --text-h:      #1A202C;   /* 제목 */
  --text-b:      #2D3748;   /* 본문 */
  --text-s:      #718096;   /* 보조 */
  --text-m:      #A0AEC0;   /* 흐린 */

  --green:  #2F855A;
  --red:    #C53030;
  --yellow: #B7791F;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow:    0 4px 12px rgba(0,0,0,.10);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text-b);
  font-family: 'Noto Sans KR', sans-serif;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.mono { font-family: 'JetBrains Mono', monospace; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-d); border-radius: 3px; }

/* ── 최상단 헤더 바 ─────────────────────────────────────── */
.top-bar {
  background: var(--mn-navy);
  padding: 0 20px;
  height: 40px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.top-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 600;
  color: #fff; letter-spacing: 2px;
}
.top-right { display: flex; align-items: center; gap: 14px; }
.top-right span { font-size: 11px; color: rgba(255,255,255,.65); font-family: 'JetBrains Mono', monospace; }
.status-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,.75); }
.status-dot::before { content:''; width:7px; height:7px; border-radius:50%; background:#48BB78; display:inline-block; box-shadow:0 0 6px #48BB78; }

/* ── 레이아웃 ────────────────────────────────────────────── */
.app-wrap { display: flex; flex: 1; overflow: hidden; }

/* ── 사이드바 ────────────────────────────────────────────── */
.sidebar {
  width: 210px; min-width: 210px;
  background: var(--mn-navy);
  display: flex; flex-direction: column;
}
.sidebar-logo {
  padding: 18px 18px 14px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-logo .l1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700;
  color: #fff; letter-spacing: 2px;
}
.sidebar-logo .l2 { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 3px; }

.nav-wrap { padding: 10px 8px; flex: 1; }
.nav-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: rgba(255,255,255,.35);
  padding: 0 8px 8px;
}
.nav-item {
  display: flex; align-items: center;
  padding: 9px 12px; border-radius: 7px;
  cursor: pointer; color: rgba(255,255,255,.65);
  font-size: 13px; font-weight: 500;
  transition: all .15s; margin-bottom: 2px;
  user-select: none; gap: 8px;
  border: 1px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active {
  background: var(--mn-orange);
  color: #fff; border-color: var(--mn-orange-d);
  box-shadow: 0 2px 8px rgba(242,101,34,.4);
}
.nav-badge {
  margin-left: auto;
  background: #FC4545; color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
  min-width: 18px; text-align: center;
  font-family: 'JetBrains Mono', monospace;
}
.sidebar-foot {
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,.1);
}
.user-card {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  background: rgba(255,255,255,.07);
}
.user-av {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--mn-orange);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; color: #fff; }
.user-role { font-size: 10px; color: rgba(255,255,255,.45); }

/* ── 메인 콘텐츠 ─────────────────────────────────────────── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; background: var(--bg); }

.page-header {
  padding: 16px 24px 12px;
  background: var(--bg-white);
  border-bottom: 2px solid var(--mn-orange);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.page-title { font-size: 17px; font-weight: 700; color: var(--mn-navy); }
.page-sub { font-size: 11px; color: var(--text-s); margin-top: 2px; }
.content { padding: 20px 24px; flex: 1; overflow-y: auto; }

/* ── 버튼 ────────────────────────────────────────────────── */
.btn {
  padding: 7px 14px; border-radius: 6px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border-d);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all .15s;
}
.btn-primary {
  background: var(--mn-orange); color: #fff;
  border-color: var(--mn-orange-d);
  box-shadow: 0 2px 6px rgba(242,101,34,.3);
}
.btn-primary:hover { background: var(--mn-orange-d); }
.btn-ghost { background: #fff; color: var(--text-s); }
.btn-ghost:hover { background: var(--bg); color: var(--text-b); }
.btn-navy { background: var(--mn-navy); color: #fff; border-color: var(--mn-navy); }
.btn-navy:hover { background: #142f4a; }
.btn-tab { background: #fff; color: var(--text-s); border: 1px solid var(--border-d); }
.btn-tab.active { background: var(--mn-orange); color: #fff; border-color: var(--mn-orange-d); }

/* ── 카드 ────────────────────────────────────────────────── */
.card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 12px; font-weight: 700;
  color: var(--text-s); margin-bottom: 12px;
  letter-spacing: .3px; text-transform: uppercase;
}
.stat-val {
  font-size: 28px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.stat-sub { font-size: 11px; color: var(--text-s); margin-top: 3px; }

/* ── 하단 챗봇 바 ─────────────────────────────────────────── */
.bottom-bar {
  background: var(--bg-white);
  border-top: 1px solid var(--border);
  padding: 10px 22px;
  flex-shrink: 0;
  box-shadow: 0 -2px 8px rgba(0,0,0,.06);
}
.chat-wrap {
  display: flex; gap: 10px; align-items: center;
  background: var(--bg); border: 1.5px solid var(--border-d);
  border-radius: 9px; padding: 7px 12px;
  transition: border-color .15s;
}
.chat-wrap:focus-within { border-color: var(--mn-orange); }
.chat-pre { font-size: 10px; color: var(--text-m); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
.chat-in {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text-b); font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
}
.chat-in::placeholder { color: var(--text-m); }
.chat-btn {
  background: var(--mn-orange); color: #fff;
  border: none; border-radius: 6px;
  padding: 6px 14px; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .15s;
}
.chat-btn:hover { background: var(--mn-orange-d); }
.chat-hint { font-size: 10px; color: var(--text-m); margin-top: 5px; }

/* ── 토스트 ─────────────────────────────────────────────── */
.toast-wrap { position: fixed; top: 14px; right: 14px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
.toast {
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 14px;
  font-size: 12px; display: flex; align-items: center; gap: 8px;
  animation: slideIn .2s ease; pointer-events: all;
  min-width: 220px; box-shadow: var(--shadow);
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--mn-orange); }
@keyframes slideIn { from { transform:translateX(16px); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* ── 모달 ───────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(26,58,92,.45);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(2px); animation: fadeIn .15s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--bg-white); border-radius: 14px;
  width: 520px; max-width: 95vw; max-height: 82vh;
  display: flex; flex-direction: column;
  animation: popIn .18s ease;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  overflow: hidden;
}
@keyframes popIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
.modal-head {
  padding: 16px 20px 13px;
  border-bottom: 2px solid var(--mn-orange);
  background: var(--mn-navy);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 700; color: #fff; }
.modal-sub { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; }
.modal-close {
  width: 26px; height: 26px; border-radius: 5px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.08); color: rgba(255,255,255,.7);
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.modal-close:hover { background: rgba(255,255,255,.15); color: #fff; }
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

/* ── 업무 아이템 ─────────────────────────────────────────── */
.task-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: 7px;
  border: 1px solid var(--border); margin-bottom: 6px;
  background: #fff; transition: border-color .15s, box-shadow .15s;
}
.task-item:hover { border-color: var(--mn-orange); box-shadow: 0 2px 8px rgba(242,101,34,.08); }
.task-chk {
  width: 15px; height: 15px; border-radius: 3px;
  border: 1.5px solid var(--border-d);
  background: transparent; cursor: pointer; flex-shrink: 0;
  appearance: none; transition: all .15s;
}
.task-chk:checked { background: var(--green); border-color: var(--green); }
.task-txt { font-size: 13px; flex: 1; }
.task-txt.done { text-decoration: line-through; color: var(--text-m); }
.task-date { font-size: 10px; color: var(--text-s); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
.task-date.overdue { color: var(--red); font-weight: 600; }
.task-del {
  width: 22px; height: 22px; border-radius: 4px;
  border: none; background: transparent; color: var(--text-m);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all .15s; flex-shrink: 0;
}
.task-del:hover { background: #FEE2E2; color: var(--red); }

/* ── 업무 추가 폼 ────────────────────────────────────────── */
.add-form {
  display: flex; gap: 8px; margin-bottom: 12px;
  padding: 8px 10px; background: var(--bg);
  border-radius: 7px; border: 1.5px solid var(--border-d);
}
.add-form:focus-within { border-color: var(--mn-orange); }
.add-in {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text-b); font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
}
.add-in::placeholder { color: var(--text-m); }
.add-date {
  background: transparent; border: none; outline: none;
  color: var(--text-s); font-size: 11px;
  font-family: 'JetBrains Mono', monospace; cursor: pointer; width: 110px;
}
input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: .5; }

/* ── 필터 바 ─────────────────────────────────────────────── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.f-btn {
  padding: 4px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  border: 1px solid var(--border-d);
  cursor: pointer; background: #fff; color: var(--text-s);
  font-family: 'Noto Sans KR', sans-serif; transition: all .15s;
}
.f-btn.active, .f-btn:hover {
  background: var(--mn-orange-l); color: var(--mn-orange);
  border-color: rgba(242,101,34,.35);
}

/* ── 섹션 ───────────────────────────────────────────────── */
.section { display: none; }
.section.active { display: block; }

/* ══════════════════════════════════════════════════════════
   아코디언 조직도
══════════════════════════════════════════════════════════ */
.acc-dept {           /* 본부 헤더 */
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--mn-navy);
  border-radius: 9px;
  cursor: pointer;
  margin-bottom: 4px;
  user-select: none;
  transition: background .15s;
}
.acc-dept:hover { background: #142f4a; }
.acc-dept.open { border-radius: 9px 9px 0 0; margin-bottom: 0; }
.acc-dept-name { font-size: 13px; font-weight: 700; color: #fff; }
.acc-dept-count {
  font-size: 10px; color: rgba(255,255,255,.5);
  font-family: 'JetBrains Mono', monospace; margin-left: 8px;
}
.acc-dept-arrow { color: rgba(255,255,255,.5); transition: transform .2s; font-size: 12px; }
.acc-dept.open .acc-dept-arrow { transform: rotate(90deg); }

.acc-dept-body {
  display: none;
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 9px 9px;
  margin-bottom: 10px;
  overflow: hidden;
}
.acc-dept-body.open { display: block; }

/* 팀(부서) 헤더 */
.acc-team {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px;
  background: var(--mn-orange-l);
  cursor: pointer;
  border-top: 1px solid var(--border);
  user-select: none; transition: background .15s;
}
.acc-team:first-child { border-top: none; }
.acc-team:hover { background: #fde8d8; }
.acc-team.open { background: #fde8d8; }
.acc-team-name {
  font-size: 12px; font-weight: 700; color: var(--mn-orange-d);
  display: flex; align-items: center; gap: 6px;
}
.acc-team-bar { width: 3px; height: 14px; background: var(--mn-orange); border-radius: 2px; }
.acc-team-arrow { color: var(--mn-orange); font-size: 11px; transition: transform .2s; }
.acc-team.open .acc-team-arrow { transform: rotate(90deg); }
.acc-team-right { display: flex; align-items: center; gap: 6px; }
.acc-team-count { font-size: 10px; color: var(--text-s); font-family: 'JetBrains Mono', monospace; }

/* 팀 멤버 바디 */
.acc-team-body {
  display: none;
  padding: 8px 12px 10px;
  background: #fff;
}
.acc-team-body.open { display: block; }

/* 멤버 행 */
.member-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 7px;
  cursor: pointer; transition: all .15s;
  border: 1px solid transparent;
  margin-bottom: 4px; position: relative;
}
.member-row:hover {
  background: var(--mn-orange-l);
  border-color: rgba(242,101,34,.25);
}
.member-av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  position: relative;
}
/* 카카오 스타일 알림 뱃지 */
.member-av .notif {
  position: absolute; top: -4px; right: -4px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #FC4545; color: #fff;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid #fff;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1;
  animation: popBadge .2s ease;
}
@keyframes popBadge { from{transform:scale(0)} to{transform:scale(1)} }
.member-name { font-size: 13px; font-weight: 600; color: var(--text-h); flex: 1; }
.member-role { font-size: 10px; color: var(--text-s); }
.member-tasks {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  padding: 2px 7px; border-radius: 8px;
  background: var(--bg); color: var(--text-s);
  border: 1px solid var(--border); flex-shrink: 0;
}

/* ── 공정구분 ─────────────────────────────────────────────── */
.process-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 10px; }
.process-card {
  background: #fff; border: 1px solid var(--border); border-radius: 9px;
  padding: 13px 15px; cursor: pointer; transition: all .18s;
  display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden;
}
.process-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 9px 0 0 9px;
}
.process-card:hover { border-color: var(--mn-orange); box-shadow: var(--shadow); transform: translateX(2px); }
.process-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.process-name { font-size: 13px; font-weight: 600; flex: 1; }
.process-cnt {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  padding: 2px 7px; border-radius: 8px; background: var(--bg);
  color: var(--text-s); border: 1px solid var(--border);
}

/* ── 캘린더 ─────────────────────────────────────────────── */
#cal-wrap .fc { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; }
#cal-wrap .fc-theme-standard td, #cal-wrap .fc-theme-standard th, #cal-wrap .fc-theme-standard .fc-scrollgrid { border-color: var(--border) !important; }
#cal-wrap .fc-col-header-cell { background: var(--mn-navy) !important; }
#cal-wrap .fc-col-header-cell-cushion { color: rgba(255,255,255,.7) !important; font-weight: 600; }
#cal-wrap .fc-daygrid-day { background: #fff; }
#cal-wrap .fc-daygrid-day:hover { background: var(--mn-orange-l); }
#cal-wrap .fc-toolbar-title { font-size: 15px !important; font-weight: 700 !important; color: var(--mn-navy) !important; }
#cal-wrap .fc-button { background: var(--bg-white) !important; border-color: var(--border-d) !important; color: var(--text-b) !important; font-family: 'Noto Sans KR', sans-serif !important; font-size: 12px !important; box-shadow: var(--shadow-sm) !important; }
#cal-wrap .fc-button:hover { background: var(--mn-orange-l) !important; border-color: var(--mn-orange) !important; color: var(--mn-orange) !important; }
#cal-wrap .fc-day-today { background: var(--mn-orange-l) !important; }
#cal-wrap .fc-day-today .fc-daygrid-day-number { color: var(--mn-orange) !important; font-weight: 700; }
#cal-wrap .fc-daygrid-day-number { color: var(--text-s); }
#cal-wrap .fc-event { font-size: 10px !important; border-radius: 3px !important; border: none !important; padding: 1px 4px !important; }
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- 상단 바 -->
<div class="top-bar">
  <span class="top-logo">BUM'S BOARD</span>
  <div class="top-right">
    <span class="status-dot">시스템 정상</span>
    <span id="clockEl"></span>
    <span id="dateEl"></span>
  </div>
</div>

<div class="app-wrap">
  <!-- 사이드바 -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="l1">BUM'S BOARD</div>
      <div class="l2">업무 컨트롤 타워</div>
    </div>
    <div class="nav-wrap">
      <div class="nav-label">메뉴</div>

function findEntity(mid){
  if(mid==='personal') return {name:'개인',role:'',color:'#F26522'};
  for(const h of HIERARCHY) for(const t of h.teams) { const m=t.members.find(x=>x.id===mid); if(m) return m; }
  return PROCESS_DATA.find(p=>p.id===mid)||null;
}
function taskCount(mid,todayOnly=false){
  const today=ds();
  return db.tasks.filter(t=>t.mid===mid&&!t.done&&(!todayOnly||(t.date<=today))).length;
}

/* ═══════════════════════════════════════
   대시보드
═══════════════════════════════════════ */
let bChart=null,dChart=null;
function renderDash(){
  const today=ds();
  const total=db.tasks.length;
  const done=db.tasks.filter(t=>t.done).length;
  const overdue=db.tasks.filter(t=>!t.done&&t.date<today).length;
  const todayDue=db.tasks.filter(t=>!t.done&&t.date===today).length;

  const statDefs=[
    {l:'전체 업무',v:total,c:'var(--mn-navy)',s:'등록된 모든 업무'},
    {l:'완료',v:done,c:'var(--green)',s:`완료율 ${total?Math.round(done/total*100):0}%`},
    {l:'오늘 마감',v:todayDue,c:'var(--mn-orange)',s:'오늘 처리 필요'},
    {l:'지연',v:overdue,c:'var(--red)',s:'기한 초과 업무'},
  ];
  document.getElementById('statCards').innerHTML=statDefs.map(s=>`
    <div class="card" style="border-left:4px solid ${s.c};">
      <div class="card-title">${s.l}</div>
      <div class="stat-val" style="color:${s.c}">${s.v}</div>
      <div class="stat-sub">${s.s}</div>
    </div>`).join('');

  // bar chart — 업무 있는 멤버 top 10
  const allE=[];
  HIERARCHY.forEach(h=>h.teams.forEach(t=>t.members.forEach(m=>allE.push(m))));
  PROCESS_DATA.forEach(p=>allE.push(p));
  const wt=allE.map(m=>({name:m.name,todo:db.tasks.filter(t=>t.mid===m.id&&!t.done).length,done2:db.tasks.filter(t=>t.mid===m.id&&t.done).length})).filter(m=>m.todo+m.done2>0).slice(0,10);

  if(bChart) bChart.destroy();
  bChart=new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',
    data:{labels:wt.map(m=>m.name),datasets:[
      {label:'진행중',data:wt.map(m=>m.todo),backgroundColor:'rgba(242,101,34,.75)',borderRadius:4},
      {label:'완료',data:wt.map(m=>m.done2),backgroundColor:'rgba(47,133,90,.6)',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#718096',font:{size:11}}}},
      scales:{x:{stacked:true,ticks:{color:'#718096',font:{size:9}},grid:{color:'#EDF2F7'}},
              y:{stacked:true,ticks:{color:'#718096',font:{size:10}},grid:{color:'#EDF2F7'}}}}
  });

  if(dChart) dChart.destroy();
  const inprog=db.tasks.filter(t=>!t.done&&t.date>=today).length;
  dChart=new Chart(document.getElementById('dnutChart').getContext('2d'),{
    type:'doughnut',
    data:{labels:['완료','진행중','지연'],datasets:[{
      data:[done,inprog,overdue],
      backgroundColor:['rgba(47,133,90,.8)','rgba(242,101,34,.8)','rgba(197,48,48,.8)'],
      borderWidth:2,borderColor:'#fff'
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#718096',font:{size:11},padding:12}}},cutout:'65%'}
  });

  const tl=db.tasks.filter(t=>(t.date===today||t.date<today)&&!t.done);
  const el=document.getElementById('todayList');
  if(!tl.length){el.innerHTML='<div style="color:var(--text-m);font-size:13px;padding:10px 0;">오늘 마감 업무가 없습니다.</div>';return;}
  el.innerHTML=tl.map(t=>{
    const m=findEntity(t.mid); const ov=t.date<today;
    return `<div class="task-item">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;">${t.text}</div>
        <div style="font-size:10px;color:var(--text-s);margin-top:1px;">${m?m.name+(m.role?' · '+m.role:''):'개인'}</div>
      </div>
      <span class="task-date ${ov?'overdue':''}">${ov?'⚠ 지연 ':''}${t.date}</span>
      <button class="task-del" onclick="toggleT('${t.id}');renderDash();">✓</button>
    </div>`;
  }).join('');
}

      <div style="display:flex;align-items:center;gap:6px;">
        <span class="acc-dept-name">${h.name}</span>
        <span class="acc-dept-count">(${allM.length}명)</span>
        ${totalTask>0?`<span style="font-size:10px;background:#FC4545;color:#fff;padding:1px 6px;border-radius:8px;font-family:'JetBrains Mono',monospace;">${totalTask}</span>`:''}
      </div>
      <span class="acc-dept-arrow">▶</span>
    </div>
    <div class="acc-dept-body" id="dept-${h.id}">`;

    h.teams.forEach(t=>{
      const teamTaskCnt=t.members.reduce((a,m)=>a+taskCount(m.id),0);
      html+=`<div class="acc-team" onclick="toggleTeam(this)" data-id="${t.id}">
        <div class="acc-team-name">
          <div class="acc-team-bar"></div>
          ${t.name}
        </div>
        <div class="acc-team-right">
          ${teamTaskCnt>0?`<span style="font-size:10px;background:#FC4545;color:#fff;padding:1px 6px;border-radius:8px;font-family:'JetBrains Mono',monospace;">${teamTaskCnt}</span>`:''}
          <span class="acc-team-count">${t.members.length}명</span>
          <span class="acc-team-arrow">▶</span>
        </div>
      </div>
      <div class="acc-team-body" id="team-${t.id}">`;

      t.members.forEach(m=>{
        const cnt=taskCount(m.id);
        const col=getMemberColor(m.id);
        const init=m.name.replace('(나)','').slice(0,2);
        html+=`<div class="member-row" onclick="openModal('${m.id}')">
          <div class="member-av" style="background:${col}22;border:1.5px solid ${col}55;color:${col};">
            ${init}
            ${cnt>0?`<div class="notif">${cnt}</div>`:''}
          </div>
          <div style="flex:1;">
            <div class="member-name">${m.name}</div>
            <div class="member-role">${m.role}</div>
          </div>
          <span class="member-tasks">${cnt}개 업무</span>
        </div>`;
      });
      html+='</div>';// acc-team-body
    });
    html+='</div>';// acc-dept-body
  });
  document.getElementById('orgPersonView').innerHTML=html;

  // ── 공정 뷰 ──
  document.getElementById('orgProcessView').innerHTML=`<div class="process-grid">`+
    PROCESS_DATA.map(p=>{
      const cnt=taskCount(p.id);
      return `<div class="process-card" style="--c:${p.color}" onclick="openModal('${p.id}')">
        <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${p.color};border-radius:9px 0 0 9px;"></div>
        <div class="process-dot" style="background:${p.color};"></div>
        <span class="process-name" style="color:var(--text-h)">${p.name}</span>
        ${cnt>0?`<span style="font-size:10px;background:#FC4545;color:#fff;padding:1px 7px;border-radius:8px;font-family:'JetBrains Mono',monospace;">${cnt}</span>`
               :`<span class="process-cnt">0개</span>`}
      </div>`;
    }).join('')+'</div>';
}

function toggleDept(el){
  el.classList.toggle('open');
  const body=document.getElementById('dept-'+el.dataset.id);
  body.classList.toggle('open');
}
function toggleTeam(el){
  el.classList.toggle('open');
  const body=document.getElementById('team-'+el.dataset.id);
  body.classList.toggle('open');
}

/* ═══════════════════════════════════════
   모달
═══════════════════════════════════════ */
let curMid=null;
function openModal(mid){
  curMid=mid;
  const m=findEntity(mid);
  document.getElementById('mTitle').textContent=m?m.name:mid;
  document.getElementById('mSub').textContent=m?(m.role||(PROCESS_DATA.find(p=>p.id===mid)?'공정구분':'')):'';
  document.getElementById('mIn').value='';
  document.getElementById('mDt').value='';
  renderMList();
  document.getElementById('modal').style.display='flex';
}
function closeModal(e){ if(e.target===document.getElementById('modal')) document.getElementById('modal').style.display='none'; }

function renderMList(){
  const tasks=db.tasks.filter(t=>t.mid===curMid);
  const today=ds();
  const el=document.getElementById('mList');
  if(!tasks.length){el.innerHTML='<div style="color:var(--text-m);font-size:13px;padding:8px 0;">등록된 업무가 없습니다.</div>';return;}
  el.innerHTML=tasks.map(t=>`<div class="task-item">
    <input type="checkbox" class="task-chk" ${t.done?'checked':''} onchange="toggleT('${t.id}');renderMList();if(curSection==='org')renderOrg();">
    <div class="task-txt ${t.done?'done':''}" style="flex:1;">${t.text}</div>
    <span class="task-date ${!t.done&&t.date<today?'overdue':''}">${t.date}</span>
    <button class="task-del" onclick="delT('${t.id}');renderMList();if(curSection==='org')renderOrg();">✕</button>
  </div>`).join('');
}

function addModalTask(){
  const text=document.getElementById('mIn').value.trim();
  const date=document.getElementById('mDt').value||ds();
  if(!text){toast('업무 내용을 입력해주세요','error');return;}
  db.tasks.push({id:uid(),mid:curMid,text,date,done:false});
  save(); document.getElementById('mIn').value='';
  renderMList(); if(curSection==='org') renderOrg();
  updateBadges(); toast('업무 추가됨','success');
}

/* ═══════════════════════════════════════
   캘린더
═══════════════════════════════════════ */
function renderCal(){
  const c=document.getElementById('cal-wrap');
  if(calInst){calInst.destroy();calInst=null;} c.innerHTML='';
  const events=db.tasks.map(t=>{
    const m=findEntity(t.mid);
    let col='#F26522';
    if(m && PROCESS_DATA.find(p=>p.id===t.mid)) col=PROCESS_DATA.find(p=>p.id===t.mid).color;
    else if(m) col=getMemberColor(t.mid);
    return {id:t.id,title:(m?m.name+' ':'')+t.text,start:t.date,backgroundColor:col+(t.done?'88':'cc'),borderColor:col,textColor:'#fff'};
  });
  calInst=new FullCalendar.Calendar(c,{
    initialView:'dayGridMonth',locale:'ko',
    headerToolbar:{left:'prev,next today',center:'title',right:'dayGridMonth,dayGridWeek'},
    events,
    eventClick(info){const t=db.tasks.find(x=>x.id===info.event.id);if(t&&t.mid) openModal(t.mid);},
    height:'auto'
  });
  calInst.render();
}

/* ═══════════════════════════════════════
   개인업무
═══════════════════════════════════════ */
let pf='all';
function setPF(f,btn){pf=f;document.querySelectorAll('#persFilter .f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderPers();}
function renderPers(){
  const today=ds();
  let tasks=db.tasks.filter(t=>t.mid==='personal');
  if(pf==='todo') tasks=tasks.filter(t=>!t.done);
  if(pf==='done') tasks=tasks.filter(t=>t.done);
  if(pf==='overdue') tasks=tasks.filter(t=>!t.done&&t.date<today);
  const el=document.getElementById('persList');
  if(!tasks.length){el.innerHTML='<div style="color:var(--text-m);font-size:13px;padding:10px 0;">해당 업무가 없습니다.</div>';return;}
  el.innerHTML=tasks.map(t=>`<div class="task-item">
    <input type="checkbox" class="task-chk" ${t.done?'checked':''} onchange="toggleT('${t.id}');renderPers();updateBadges();">
    <div class="task-txt ${t.done?'done':''}" style="flex:1;">${t.text}</div>
    <span class="task-date ${!t.done&&t.date<today?'overdue':''}">${t.date}</span>
    <button class="task-del" onclick="delT('${t.id}');renderPers();updateBadges();">✕</button>
  </div>`).join('');
}
function addPers(){
  const text=document.getElementById('persIn').value.trim();
  const date=document.getElementById('persDt').value||ds();
  if(!text){toast('업무 내용을 입력해주세요','error');return;}
  db.tasks.push({id:uid(),mid:'personal',text,date,done:false});
  save(); document.getElementById('persIn').value=''; document.getElementById('persDt').value='';
  renderPers(); updateBadges(); toast('개인 업무 추가됨','success');
}

/* ═══════════════════════════════════════
   태스크 공통
═══════════════════════════════════════ */
function toggleT(id){const t=db.tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();}}
function delT(id){db.tasks=db.tasks.filter(x=>x.id!==id);save();updateBadges();}

/* ═══════════════════════════════════════
   챗봇 파서
═══════════════════════════════════════ */
function parseChat(){
  const raw=document.getElementById('chatIn').value.trim(); if(!raw) return;
  let date=ds(1), text=raw;
  const dm=text.match(/(\d{4}-\d{2}-\d{2})/);
  if(dm){date=dm[1];text=text.replace(dm[0],'').trim();}
  else if(/오늘/.test(text)){date=ds(0);text=text.replace(/오늘/g,'').trim();}
  else if(/내일/.test(text)){date=ds(1);text=text.replace(/내일/g,'').trim();}
  else if(/다음\s*주/.test(text)){date=ds(7);text=text.replace(/다음\s*주/g,'').trim();}

  let mid='personal', mName='개인';
  const allMem=[];
  HIERARCHY.forEach(h=>h.teams.forEach(t=>t.members.forEach(m=>allMem.push({id:m.id,name:m.name.replace('(나)','')}))));
  PROCESS_DATA.forEach(p=>allMem.push({id:p.id,name:p.name}));
  allMem.sort((a,b)=>b.name.length-a.name.length);

  for(const e of allMem){
    if(text.startsWith(e.name)){mid=e.id;mName=e.name;text=text.slice(e.name.length).trim();break;}
  }
  if(mid==='personal'){for(const kw of['나','본인','관리자']){if(text.startsWith(kw+' ')||text===kw){text=text.slice(kw.length).trim();break;}}}
  if(!text){toast('업무 내용을 입력해주세요','error');return;}

  db.tasks.push({id:uid(),mid,text,date,done:false});
  save(); document.getElementById('chatIn').value='';
  toast(`[${mName}] ${text} (${date}) 등록됨`,'success');
  updateBadges();
  if(curSection==='dashboard') renderDash();
  if(curSection==='org') renderOrg();
  if(curSection==='personal') renderPers();
}
document.getElementById('chatIn').addEventListener('keydown',e=>{if(e.key==='Enter')parseChat();});

/* ═══════════════════════════════════════
   뱃지
═══════════════════════════════════════ */
function updateBadges(){
  const today=ds();
  const ov=db.tasks.filter(t=>!t.done&&t.date<today&&t.mid!=='personal').length;
  const ob=document.getElementById('orgBadge');
  if(ov>0){ob.style.display='';ob.textContent=ov;}else ob.style.display='none';
  const pn=db.tasks.filter(t=>t.mid==='personal'&&!t.done).length;
  const pb=document.getElementById('persBadge');
  if(pn>0){pb.style.display='';pb.textContent=pn;}else pb.style.display='none';
}

/* ═══════════════════════════════════════
   토스트
═══════════════════════════════════════ */
function toast(msg,type='info'){
  const w=document.getElementById('toastWrap');
  const el=document.createElement('div'); el.className=`toast ${type}`;
  el.innerHTML=`<span>${msg}</span>`; w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},2500);
}

/* ═══════════════════════════════════════
   초기화
═══════════════════════════════════════ */
renderDash(); updateBadges();
</script>
