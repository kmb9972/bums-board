<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BUM'S BOARD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet"/>
<style>
/* ── 디자인 참고 기반 컬러 시스템 ───────────────────────── */
:root{
  --bg:#f0f5ff;
  --surface:#fff;
  --surface2:#eef4ff;
  --border:#c5d8ff;
  --border2:#a8c4f8;
  --text:#0d1f4e;
  --text2:#3a4a6b;
  --text3:#6b7a99;
  --accent:#2351c5;
  --accent2:#1a3a8f;
  --blue-main:#2351c5;
  --blue-deep:#1a3a8f;
  --blue-mid:#3461d4;
  --blue-bg:#dbe9ff;
  --blue-pale:#eef4ff;
  --blue-dark:#0d1f4e;
  --green:#27500A;--green-bg:#E2EFDA;--green-mid:#639922;
  --amber:#633806;--amber-bg:#FFF2CC;--amber-mid:#BA7517;
  --red:#791F1F;--red-bg:#FCE4EC;--red-mid:#E24B4A;
  --purple-mid:#7F77DD;--purple-bg:#EEEDFE;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(35,81,197,.08),0 1px 3px rgba(35,81,197,.04);
  --shadow-md:0 4px 20px rgba(35,81,197,.12),0 2px 6px rgba(35,81,197,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.6;
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
}
.mono{font-family:'Montserrat',sans-serif;}

/* ── 스크롤바 ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── 상단 바 ── */
.top-bar{
  background:linear-gradient(90deg,var(--blue-deep),var(--blue-main));
  padding:0 20px;height:38px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(35,81,197,.25);
}
.top-logo{
  font-family:'Montserrat',sans-serif;
  font-size:13px;font-weight:900;
  color:#fff;letter-spacing:2px;
}
.top-right{display:flex;align-items:center;gap:14px;}
.top-right span{font-size:11px;color:rgba(255,255,255,.6);font-family:'Montserrat',sans-serif;}
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:rgba(255,255,255,.8);
  background:rgba(255,255,255,.12);
  padding:2px 10px;border-radius:20px;
}
.status-pill::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:#4ADE80;display:inline-block;
  box-shadow:0 0 6px #4ADE80;
}

/* ── 레이아웃 ── */
.app-wrap{display:flex;flex:1;overflow:hidden;}

/* ── 사이드바 ── */
.sidebar{
  width:220px;min-width:220px;
  background:linear-gradient(180deg,var(--blue-main),var(--blue-deep));
  color:#fff;display:flex;flex-direction:column;
  box-shadow:4px 0 20px rgba(35,81,197,.2);
  flex-shrink:0;
}
.sidebar-logo{
  padding:22px 20px 18px;
  border-bottom:1px solid rgba(255,255,255,.15);
}
.sidebar-logo .l1{
  font-family:'Montserrat',sans-serif;
  font-size:13px;font-weight:900;
  color:#fff;letter-spacing:2px;
}
.sidebar-logo .l2{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px;}

.nav-section-label{
  font-size:10px;letter-spacing:.08em;
  color:rgba(255,255,255,.4);
  padding:16px 20px 6px;
  text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;font-size:13px;
  cursor:pointer;color:rgba(255,255,255,.65);
  transition:all .15s;
  border-left:3px solid transparent;
  user-select:none;
}
.nav-item:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06);}
.nav-item.active{
  color:#fff;background:rgba(255,255,255,.15);
  border-left-color:#fff;font-weight:700;
  border-left-width:4px;
}
.nav-badge{
  margin-left:auto;
  background:#FC4545;color:#fff;
  font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:10px;
  min-width:18px;text-align:center;
  font-family:'Montserrat',sans-serif;
}
.sidebar-foot{
  padding:14px;
  border-top:1px solid rgba(255,255,255,.12);
  margin-top:auto;
}
.user-card{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;border-radius:10px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
}
.user-av{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
  font-family:'Montserrat',sans-serif;
}
.user-name{font-size:12px;font-weight:700;color:#fff;}
.user-role{font-size:10px;color:rgba(255,255,255,.45);}

/* ── 메인 ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg);}

.page-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px 14px;
  background:var(--surface);
  border-bottom:3px solid var(--blue-main);
  flex-shrink:0;
  box-shadow:var(--shadow);
}
.page-title{
  font-size:20px;font-weight:900;
  color:var(--blue-deep);
  letter-spacing:-.5px;
  font-family:'Montserrat',sans-serif;
}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.content{padding:22px 28px;flex:1;overflow-y:auto;}

/* ── 버튼 ── */
.btn{
  padding:7px 14px;border-radius:var(--radius-sm);
  font-size:12px;font-weight:700;
  border:1px solid var(--border2);
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:all .15s;
}
.btn-primary{
  background:var(--blue-main);color:#fff;
  border-color:var(--blue-deep);
  box-shadow:0 2px 8px rgba(35,81,197,.3);
}
.btn-primary:hover{background:var(--blue-deep);}
.btn-ghost{
  background:var(--surface);color:var(--text2);
  border-color:var(--border2);
}
.btn-ghost:hover{background:var(--blue-pale);color:var(--blue-main);}
.btn-tab{
  background:var(--surface);color:var(--text2);
  border:1px solid var(--border2);
}
.btn-tab.active{
  background:var(--blue-main);color:#fff;
  border-color:var(--blue-deep);
}

/* ── 카드 ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 20px;
  box-shadow:var(--shadow);
  border-top:3px solid var(--blue-main);
}
.card-title{
  font-size:12px;font-weight:700;
  color:var(--text3);margin-bottom:12px;
  letter-spacing:.03em;text-transform:uppercase;
}
.stat-val{
  font-size:28px;font-weight:900;line-height:1;
  font-family:'Montserrat',sans-serif;
}
.stat-sub{font-size:11px;color:var(--text3);margin-top:6px;}

/* ── 하단 챗봇 바 ── */
.bottom-bar{
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:10px 22px;flex-shrink:0;
  box-shadow:0 -2px 10px rgba(35,81,197,.07);
}
.chat-wrap{
  display:flex;gap:10px;align-items:center;
  background:var(--blue-pale);
  border:1.5px solid var(--border2);
  border-radius:var(--radius-sm);padding:7px 12px;
  transition:border-color .15s;
}
.chat-wrap:focus-within{border-color:var(--blue-main);}
.chat-pre{font-size:10px;color:var(--text3);font-family:'Montserrat',sans-serif;white-space:nowrap;}
.chat-in{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;
}
.chat-in::placeholder{color:var(--text3);}
.chat-btn{
  background:var(--blue-main);color:#fff;border:none;
  border-radius:var(--radius-sm);
  padding:6px 14px;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;
  transition:background .15s;
  box-shadow:0 2px 6px rgba(35,81,197,.3);
}
.chat-btn:hover{background:var(--blue-deep);}
.chat-hint{font-size:10px;color:var(--text3);margin-top:5px;}

/* ── 토스트 ── */
.toast-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:9px 14px;font-size:12px;
  display:flex;align-items:center;gap:8px;
  animation:slideIn .2s ease;pointer-events:all;
  min-width:220px;box-shadow:var(--shadow-md);
}
.toast.success{border-left:3px solid var(--green-mid);}
.toast.error{border-left:3px solid var(--red-mid);}
.toast.info{border-left:3px solid var(--blue-main);}
@keyframes slideIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── 모달 ── */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(13,31,78,.45);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(2px);animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border-radius:var(--radius);
  width:520px;max-width:95vw;max-height:82vh;
  display:flex;flex-direction:column;
  animation:popIn .18s ease;
  box-shadow:var(--shadow-md);
  border:1px solid var(--border);
  overflow:hidden;
}
@keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{
  padding:16px 20px 13px;
  background:linear-gradient(135deg,var(--blue-main),var(--blue-deep));
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--blue-mid);
}
.modal-title{font-size:15px;font-weight:900;color:#fff;font-family:'Montserrat',sans-serif;}
.modal-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
.modal-close{
  width:26px;height:26px;border-radius:6px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.modal-close:hover{background:rgba(255,255,255,.2);color:#fff;}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1;}

/* ── 업무 아이템 ── */
.task-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);margin-bottom:6px;
  background:var(--surface);
  transition:all .15s;
}
.task-item:hover{border-color:var(--blue-mid);box-shadow:0 2px 8px rgba(35,81,197,.1);}
.task-chk{
  width:15px;height:15px;border-radius:3px;
  border:1.5px solid var(--border2);
  background:transparent;cursor:pointer;flex-shrink:0;
  appearance:none;transition:all .15s;
}
.task-chk:checked{background:var(--green-mid);border-color:var(--green-mid);}
.task-txt{font-size:13px;flex:1;}
.task-txt.done{text-decoration:line-through;color:var(--text3);}
.task-date{font-size:10px;color:var(--text3);font-family:'Montserrat',sans-serif;flex-shrink:0;}
.task-date.overdue{color:var(--red-mid);font-weight:700;}
.task-del{
  width:22px;height:22px;border-radius:50%;
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .15s;flex-shrink:0;
}
.task-del:hover{background:var(--red-bg);color:var(--red-mid);}

/* ── 업무 추가 폼 ── */
.add-form{
  display:flex;gap:8px;margin-bottom:12px;
  padding:8px 10px;
  background:var(--blue-pale);
  border-radius:var(--radius-sm);
  border:1.5px solid var(--border2);
}
.add-form:focus-within{border-color:var(--blue-main);}
.add-in{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;
}
.add-in::placeholder{color:var(--text3);}
.add-date{
  background:transparent;border:none;outline:none;
  color:var(--text3);font-size:11px;cursor:pointer;width:110px;
  font-family:'Montserrat',sans-serif;
}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5;}

/* ── 필터 탭 ── */
.filter-bar{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.f-btn{
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--border2);cursor:pointer;
  background:transparent;color:var(--text2);
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;
}
.f-btn.active,.f-btn:hover{
  background:var(--blue-main);color:#fff;border-color:var(--blue-main);
}

/* ── 섹션 ── */
.section{display:none;}
.section.active{display:block;}

/* ═══════════════════════════════════════
   아코디언 조직도
═══════════════════════════════════════ */
/* 본부 헤더 */
.acc-dept{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;
  background:linear-gradient(135deg,var(--blue-main),var(--blue-deep));
  border-radius:var(--radius);
  cursor:pointer;margin-bottom:4px;user-select:none;
  transition:all .15s;
  box-shadow:var(--shadow);
}
.acc-dept:hover{box-shadow:var(--shadow-md);}
.acc-dept.open{border-radius:var(--radius) var(--radius) 0 0;margin-bottom:0;}
.acc-dept-name{
  font-size:13px;font-weight:900;color:#fff;
  font-family:'Montserrat',sans-serif;letter-spacing:.03em;
}
.acc-dept-count{font-size:10px;color:rgba(255,255,255,.5);margin-left:8px;font-family:'Montserrat',sans-serif;}
.acc-dept-arrow{color:rgba(255,255,255,.6);transition:transform .2s;font-size:11px;}
.acc-dept.open .acc-dept-arrow{transform:rotate(90deg);}

/* 본부 바디 */
.acc-dept-body{
  display:none;
  background:var(--surface);
  border:1px solid var(--border);
  border-top:none;
  border-radius:0 0 var(--radius) var(--radius);
  margin-bottom:12px;overflow:hidden;
}
.acc-dept-body.open{display:block;}

/* 팀 헤더 */
.acc-team{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 18px;
  background:var(--blue-pale);
  cursor:pointer;border-top:1px solid var(--border);
  user-select:none;transition:background .15s;
}
.acc-team:first-child{border-top:none;}
.acc-team:hover{background:var(--blue-bg);}
.acc-team.open{background:var(--blue-bg);}
.acc-team-name{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;color:var(--blue-main);
}
.acc-team-bar{width:3px;height:14px;background:var(--blue-main);border-radius:2px;}
.acc-team-arrow{color:var(--blue-mid);font-size:10px;transition:transform .2s;}
.acc-team.open .acc-team-arrow{transform:rotate(90deg);}
.acc-team-right{display:flex;align-items:center;gap:6px;}
.acc-team-count{font-size:10px;color:var(--text3);font-family:'Montserrat',sans-serif;}

/* 팀원 바디 */
.acc-team-body{
  display:none;padding:8px 14px 10px;
  background:var(--surface);
}
.acc-team-body.open{display:block;}

/* 멤버 행 */
.member-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:var(--radius-sm);
  cursor:pointer;transition:all .15s;
  border:1px solid transparent;
  margin-bottom:4px;
}
.member-row:hover{background:var(--blue-pale);border-color:var(--border);}
.member-av{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
  position:relative;
  font-family:'Montserrat',sans-serif;
}
/* 카카오톡 스타일 알림 뱃지 */
.member-av .notif{
  position:absolute;top:-4px;right:-4px;
  width:16px;height:16px;border-radius:50%;
  background:#FC4545;color:#fff;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;
  font-family:'Montserrat',sans-serif;
  line-height:1;
  animation:popBadge .2s ease;
  box-shadow:0 1px 4px rgba(252,69,69,.5);
}
@keyframes popBadge{from{transform:scale(0)}to{transform:scale(1)}}
.member-name{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.member-role{font-size:10px;color:var(--text3);}
.member-tasks{
  font-size:10px;font-family:'Montserrat',sans-serif;
  padding:2px 8px;border-radius:20px;
  background:var(--blue-pale);color:var(--blue-main);
  border:1px solid var(--border2);flex-shrink:0;
  font-weight:600;
}

/* ── 공정구분 ── */
.process-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;}
.process-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;cursor:pointer;
  transition:all .18s;display:flex;align-items:center;gap:10px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow);
}
.process-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;border-radius:var(--radius) 0 0 var(--radius);
}
.process-card:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.process-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.process-name{font-size:13px;font-weight:700;flex:1;color:var(--text);}
.process-cnt{
  font-size:10px;font-family:'Montserrat',sans-serif;
  padding:2px 8px;border-radius:20px;
  background:var(--blue-pale);color:var(--blue-main);
  border:1px solid var(--border2);font-weight:600;
}

/* ── 캘린더 ── */
#cal-wrap .fc{font-family:'Noto Sans KR',sans-serif;font-size:12px;}
#cal-wrap .fc-theme-standard td,#cal-wrap .fc-theme-standard th,#cal-wrap .fc-theme-standard .fc-scrollgrid{border-color:var(--border)!important;}
#cal-wrap .fc-col-header-cell{background:var(--blue-main)!important;}
#cal-wrap .fc-col-header-cell-cushion{color:rgba(255,255,255,.85)!important;font-weight:700;}
#cal-wrap .fc-daygrid-day{background:var(--surface);}
#cal-wrap .fc-daygrid-day:hover{background:var(--blue-pale);}
#cal-wrap .fc-toolbar-title{font-size:15px!important;font-weight:900!important;color:var(--blue-deep)!important;font-family:'Montserrat',sans-serif!important;}
#cal-wrap .fc-button{background:var(--surface)!important;border-color:var(--border2)!important;color:var(--text)!important;font-family:'Noto Sans KR',sans-serif!important;font-size:12px!important;box-shadow:var(--shadow)!important;}
#cal-wrap .fc-button:hover{background:var(--blue-pale)!important;border-color:var(--blue-main)!important;color:var(--blue-main)!important;}
#cal-wrap .fc-day-today{background:var(--blue-pale)!important;}
#cal-wrap .fc-day-today .fc-daygrid-day-number{color:var(--blue-main)!important;font-weight:900;}
#cal-wrap .fc-daygrid-day-number{color:var(--text2);}
#cal-wrap .fc-col-header-cell-cushion{color:rgba(255,255,255,.8);font-weight:700;}
#cal-wrap .fc-event{font-size:10px!important;border-radius:4px!important;border:none!important;padding:1px 5px!important;}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- 상단 바 -->
<div class="top-bar">
  <span class="top-logo">BUM'S BOARD</span>
  <div class="top-right">

/* ═══ 유틸 ══════════════════════════════════════════════════ */
function findEntity(mid){
  if(mid==='personal')return{name:'개인',role:'',color:'#2351c5'};
  for(const h of HIERARCHY)for(const t of h.teams){const m=t.members.find(x=>x.id===mid);if(m)return m;}
  return PROCESS_DATA.find(p=>p.id===mid)||null;
}
function taskCount(mid){return db.tasks.filter(t=>t.mid===mid&&!t.done).length;}

/* ═══ 대시보드 ══════════════════════════════════════════════ */
let bChart=null;
function renderDash(){
  const today=ds();
  const total=db.tasks.length;
  const done=db.tasks.filter(t=>t.done).length;
  const overdue=db.tasks.filter(t=>!t.done&&t.date<today).length;
  const todayDue=db.tasks.filter(t=>!t.done&&t.date===today).length;

  const statDefs=[
    {l:'전체 요청',v:total,c:'var(--blue-main)',s:'등록된 모든 업무 요청'},
    {l:'완료',v:done,c:'var(--green-mid)',s:`완료율 ${total?Math.round(done/total*100):0}%`},
    {l:'오늘 마감',v:todayDue,c:'var(--amber-mid)',s:'오늘 처리 필요'},
    {l:'지연',v:overdue,c:'var(--red-mid)',s:'기한 초과 요청'},
  ];
  document.getElementById('statCards').innerHTML=statDefs.map((s,i)=>{
    const colors=['var(--blue-main)','var(--green-mid)','var(--amber-mid)','var(--red-mid)'];
    return `<div class="card" style="border-top-color:${colors[i]};">
      <div class="card-title">${s.l}</div>
      <div class="stat-val" style="color:${s.c}">${s.v}</div>
      <div class="stat-sub">${s.s}</div>
    </div>`;
  }).join('');

  // 부서별 집계 (팀 단위)
  const deptData=[];
  HIERARCHY.forEach(h=>{
    h.teams.forEach(t=>{
      const memberIds=t.members.map(m=>m.id);
      const todo=db.tasks.filter(x=>memberIds.includes(x.mid)&&!x.done).length;
      const done2=db.tasks.filter(x=>memberIds.includes(x.mid)&&x.done).length;
      if(todo+done2>0) deptData.push({name:t.name,todo,done2});
    });
  });
  // 공정구분도 포함
  PROCESS_DATA.forEach(p=>{
    const todo=db.tasks.filter(x=>x.mid===p.id&&!x.done).length;
    const done2=db.tasks.filter(x=>x.mid===p.id&&x.done).length;
    if(todo+done2>0) deptData.push({name:p.name,todo,done2});
  });

  if(bChart)bChart.destroy();
  if(!deptData.length){
    document.getElementById('barChart').style.display='none';
  } else {
    document.getElementById('barChart').style.display='';
    bChart=new Chart(document.getElementById('barChart').getContext('2d'),{
      type:'bar',
      data:{labels:deptData.map(d=>d.name),datasets:[
        {label:'진행중',data:deptData.map(d=>d.todo),backgroundColor:'rgba(35,81,197,.75)',borderRadius:4},
        {label:'완료',data:deptData.map(d=>d.done2),backgroundColor:'rgba(99,153,34,.65)',borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#6b7a99',font:{size:11}}}},
        scales:{x:{stacked:true,ticks:{color:'#6b7a99',font:{size:9},maxRotation:30},grid:{color:'#dbe9ff'}},
                y:{stacked:true,ticks:{color:'#6b7a99',font:{size:10}},grid:{color:'#dbe9ff'}}}}
    });
  }

  const tl=db.tasks.filter(t=>(t.date===today||t.date<today)&&!t.done);
  const el=document.getElementById('todayList');
  if(!tl.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;padding:10px 0;">오늘 마감 업무가 없습니다.</div>';return;}
  el.innerHTML=tl.map(t=>{
    const m=findEntity(t.mid);const ov=t.date<today;
    return `<div class="task-item">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">${t.text}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:1px;">${m?m.name+(m.role?' · '+m.role:''):'개인'}</div>
      </div>
      ${t.color?`<span style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0;display:inline-block;margin-right:4px;"></span>`:''}
      <span class="task-date ${ov?'overdue':''}">${ov?'⚠ 지연 ':''}${t.startDate&&t.startDate!==t.date?t.startDate+' ~ '+t.date:t.date}</span>
      <button class="task-del" onclick="toggleT('${t.id}');renderDash();">✓</button>
    </div>`;
  }).join('');
}

/* ═══ 조직도 아코디언 ═══════════════════════════════════════ */
function renderOrg(){
  let html='';
  HIERARCHY.forEach(h=>{
    const allM=h.teams.flatMap(t=>t.members);
    const totalTask=allM.reduce((a,m)=>a+taskCount(m.id),0);
    html+=`<div class="acc-dept" onclick="toggleDept(this)" data-id="${h.id}">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="acc-dept-name">${h.name}</span>
        <span class="acc-dept-count">(${allM.length}명)</span>
        ${totalTask>0?`<span style="font-size:10px;background:#FC4545;color:#fff;padding:1px 7px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;">${totalTask}</span>`:''}
      </div>
      <span class="acc-dept-arrow">▶</span>
    </div>
    <div class="acc-dept-body" id="dept-${h.id}">`;

    h.teams.forEach(t=>{
      const tc=t.members.reduce((a,m)=>a+taskCount(m.id),0);
      html+=`<div class="acc-team" onclick="toggleTeam(this)" data-id="${t.id}">
        <div class="acc-team-name">
          <div class="acc-team-bar"></div>${t.name}
        </div>
        <div class="acc-team-right">
          ${tc>0?`<span style="font-size:10px;background:#FC4545;color:#fff;padding:1px 7px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;">${tc}</span>`:''}
          <span class="acc-team-count">${t.members.length}명</span>
          <span class="acc-team-arrow">▶</span>
        </div>
      </div>
      <div class="acc-team-body" id="team-${t.id}">`;

      t.members.forEach(m=>{
        const cnt=taskCount(m.id);

function renderCal(){
  const c=document.getElementById('cal-wrap');
  if(calInst){calInst.destroy();calInst=null;}c.innerHTML='';
  const events=db.tasks.map(t=>{
    const m=findEntity(t.mid);
    let col='#2351c5';
    const p=PROCESS_DATA.find(x=>x.id===t.mid);
    if(p)col=p.color;else if(m)col=getAvColor(t.mid);
    const evColor = t.color || col;
    const bgColor = t.done ? evColor+'88' : evColor+'ee';
    const brightColors = ['#E2E8F0','#D69E2E','#F97316'];
    const txtColor = brightColors.includes(t.color) ? '#1A202C' : '#fff';
    const ev={id:t.id,title:(m?m.name+' ':'')+t.text,start:t.startDate||t.date,backgroundColor:bgColor,borderColor:evColor,textColor:txtColor};
    if(t.startDate&&t.startDate!==t.date){
      const endD=new Date(t.date);endD.setDate(endD.getDate()+1);
      ev.end=endD.toISOString().slice(0,10);
    }
    return ev;
  });
  calInst=new FullCalendar.Calendar(c,{
    initialView:'dayGridMonth',locale:'ko',
    headerToolbar:{left:'prev,next today',center:'title',right:'dayGridMonth,dayGridWeek'},
    events,
    eventClick(info){const t=db.tasks.find(x=>x.id===info.event.id);if(t&&t.mid)openModal(t.mid);},
    height:'auto'
  });
  calInst.render();
}

/* ═══ 챗봇 파서 (업그레이드) ══════════════════════════════════ */

// 연도 기본값
function curYear(){ return new Date().getFullYear(); }

// 날짜 토큰 → YYYY-MM-DD
function tokenToDate(str){
  const y = curYear();
  let m;
  m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = str.match(/^(\d{1,2})월\s*(\d{1,2})일?$/);
  if(m) return `${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  m = str.match(/^(\d{1,2})[./](\d{1,2})$/);
  if(m) return `${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  if(/오늘/.test(str)) return ds(0);
  if(/내일/.test(str)) return ds(1);
  if(/다음\s*주/.test(str)) return ds(7);
  return null;
}

function parseChat(){
  const raw = document.getElementById('chatIn').value.trim();
  if(!raw) return;
  let text = raw;

  /* ── STEP 1. 기간 패턴 우선 추출 ── */
  let startDate = null, endDate = null;

  // 패턴A: N월 N일(부터/~) N월 N일(까지)
  const patA = /(\d{1,2})월\s*(\d{1,2})일?\s*(?:부터|~|에서)\s*(\d{1,2})월\s*(\d{1,2})일?(?:\s*까지)?/;
  // 패턴B: YYYY-MM-DD(부터/~)YYYY-MM-DD(까지)
  const patB = /(\d{4}-\d{2}-\d{2})\s*(?:부터|~|에서)\s*(\d{4}-\d{2}-\d{2})(?:\s*까지)?/;
  // 패턴C: N/N(부터/~)N/N(까지)
  const patC = /(\d{1,2})[./](\d{1,2})\s*(?:부터|~|에서)\s*(\d{1,2})[./](\d{1,2})(?:\s*까지)?/;

  let rangeMatch = text.match(patA);
  if(rangeMatch){
    const y = curYear();
    startDate = `${y}-${rangeMatch[1].padStart(2,'0')}-${rangeMatch[2].padStart(2,'0')}`;
    endDate   = `${y}-${rangeMatch[3].padStart(2,'0')}-${rangeMatch[4].padStart(2,'0')}`;
    text = text.replace(rangeMatch[0], '').trim();
  } else {
    rangeMatch = text.match(patB);
    if(rangeMatch){
      startDate = rangeMatch[1];
      endDate   = rangeMatch[2];
      text = text.replace(rangeMatch[0], '').trim();
    } else {
      rangeMatch = text.match(patC);
      if(rangeMatch){
        const y = curYear();
        startDate = `${y}-${rangeMatch[1].padStart(2,'0')}-${rangeMatch[2].padStart(2,'0')}`;
        endDate   = `${y}-${rangeMatch[3].padStart(2,'0')}-${rangeMatch[4].padStart(2,'0')}`;
        text = text.replace(rangeMatch[0], '').trim();
      }
    }
  }
  // 기간 추출 후 남은 부터/까지/~ 제거
  text = text.replace(/부터|까지|에서/g, '').trim();

  /* ── STEP 2. 단일 날짜 추출 (기간 없을 때만) ── */
  let date = ds(1); // 기본값: 내일
  if(endDate){
    date = endDate; // 기간이면 마감일 = endDate
  } else {
    // 오늘/내일/다음주 먼저
    if(/오늘/.test(text))      { date = ds(0); text = text.replace(/오늘/g,'').trim(); }
    else if(/내일/.test(text)) { date = ds(1); text = text.replace(/내일/g,'').trim(); }
    else if(/다음\s*주/.test(text)){ date = ds(7); text = text.replace(/다음\s*주/g,'').trim(); }
    else {
      // N월 N일
      const mKo = text.match(/(\d{1,2})월\s*(\d{1,2})일?/);
      if(mKo){
        const parsed = tokenToDate(mKo[0]);
        if(parsed){ date = parsed; text = text.replace(mKo[0],'').trim(); }
      } else {
        // YYYY-MM-DD
        const mFull = text.match(/\d{4}-\d{2}-\d{2}/);
        if(mFull){
          date = mFull[0]; text = text.replace(mFull[0],'').trim();
        } else {
          // N/N or N.N
          const mSlash = text.match(/(\d{1,2})[./](\d{1,2})/);
          if(mSlash){
            const parsed = tokenToDate(mSlash[0]);
            if(parsed){ date = parsed; text = text.replace(mSlash[0],'').trim(); }
          }
        }
      }
    }
  }

  /* ── STEP 3. 이름/공정 추출 (텍스트 어디서든, 순서 무관) ── */
  let mid = 'personal', mName = '개인';
  const allMem = [];
  HIERARCHY.forEach(h=>h.teams.forEach(t=>t.members.forEach(m=>
    allMem.push({id:m.id, name:m.name.replace('(나)','')})
  )));
  PROCESS_DATA.forEach(p=>allMem.push({id:p.id, name:p.name}));
  allMem.sort((a,b)=>b.name.length - a.name.length);

  const honorifics = ['본부장','팀장','실장','파트장','수석','책임','선임','님','씨'];
  for(const e of allMem){
    const idx = text.indexOf(e.name);
    if(idx !== -1){
      mid = e.id; mName = e.name;
      let endIdx = idx + e.name.length;
      // 바로 뒤 호칭도 제거
      const rest = text.slice(endIdx).trimStart();
      for(const h of honorifics){
        if(rest.startsWith(h)){ endIdx += text.slice(endIdx).length - rest.slice(h.length).trimStart().length; break; }
      }
      text = (text.slice(0, idx) + ' ' + text.slice(endIdx)).trim();
      break;
    }
  }
  // 개인 키워드
  if(mid === 'personal'){
    for(const kw of ['나','본인','관리자']){
      if(text === kw || text.startsWith(kw+' ') || text.includes(' '+kw+' ') || text.endsWith(' '+kw)){
        text = text.replace(new RegExp(`(^|\\s)${kw}(\\s|$)`), ' ').trim(); break;
      }
    }
  }

  /* ── STEP 4. 나머지 조사/잔여 표현 정리 ── */
  text = text
    .replace(/요청\s*(?:했|하래|해|함|드림)?/g, '')
    .replace(/하래/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  if(!text){ toast('업무 내용을 입력해주세요', 'error'); return; }

  /* ── STEP 5. 색상 추출 ── */
  const COLOR_MAP = {
    '빨강':'#E53E3E','빨간':'#E53E3E',
    '주황':'#F97316',
    '노랑':'#D69E2E','노란':'#D69E2E',
    '초록':'#38A169','녹색':'#38A169',
    '파랑':'#2351c5','파란':'#2351c5','하늘':'#3B82F6',
    '남색':'#1A3A8F','남':'#1A3A8F',
    '보라':'#7F77DD','보라색':'#7F77DD',
    '회색':'#718096','회':'#718096',
    '흰색':'#E2E8F0','하얀':'#E2E8F0','흰':'#E2E8F0',
    '검정':'#2D3748','검은':'#2D3748','블랙':'#2D3748',
  };
  let taskColor = null;
  for(const [kw, hex] of Object.entries(COLOR_MAP)){
    const re = new RegExp(`(^|\s)${kw}(\s|$)`);
    if(re.test(text)){
      taskColor = hex;
      text = text.replace(re, ' ').trim();
      break;
    }
  }

  /* ── STEP 6. 저장 ── */
  const task = {id:uid(), mid, text, date, done:false};
  if(startDate && startDate !== date) task.startDate = startDate;
  if(taskColor) task.color = taskColor;

  db.tasks.push(task);
  save();
  document.getElementById('chatIn').value = '';

  const dateLabel = (startDate && startDate !== date) ? `${startDate} ~ ${date}` : date;
  const colorLabel = taskColor ? ` 🎨` : ''; toast(`[${mName}] ${text} (${dateLabel})${colorLabel} 등록됨`, 'success');
  updateBadges();
  if(cur==='dashboard') renderDash();
  if(cur==='org') renderOrg();
  if(cur==='personal') renderPers();
}
document.getElementById('chatIn').addEventListener('keydown',e=>{if(e.key==='Enter')parseChat();});

/* ═══ 뱃지 ══════════════════════════════════════════════════ */
function updateBadges(){
  const today=ds();
  const ov=db.tasks.filter(t=>!t.done&&t.date<today&&t.mid!=='personal').length;
  const ob=document.getElementById('orgBadge');
  if(ov>0){ob.style.display='';ob.textContent=ov;}else ob.style.display='none';
  const pn=db.tasks.filter(t=>t.mid==='personal'&&!t.done).length;
  const pb=document.getElementById('persBadge');
  if(pn>0){pb.style.display='';pb.textContent=pn;}else pb.style.display='none';
}

/* ═══ 토스트 ════════════════════════════════════════════════ */
function toast(msg,type='info'){
  const w=document.getElementById('toastWrap');
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`<span>${msg}</span>`;w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},2500);
}
