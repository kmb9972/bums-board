<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BEOM WORK BOARD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════
   CSS 변수 — 라이트 / 다크
══════════════════════════════════════ */
:root{
  --bg:#f0f5ff;
  --surface:#fff;
  --surface2:#eef4ff;
  --border:#c5d8ff;
  --border2:#a8c4f8;
  --text:#0d1f4e;
  --text2:#3a4a6b;
  --text3:#6b7a99;
  --accent:#2351c5;
  --accent2:#1a3a8f;
  --accent-l:#eef4ff;
  --sidebar-bg:linear-gradient(180deg,#2351c5,#1a3a8f);
  --sidebar-text:rgba(255,255,255,.7);
  --sidebar-active:rgba(255,255,255,.18);
  --header-border:#2351c5;
  --shadow:0 2px 12px rgba(35,81,197,.08);
  --shadow-md:0 6px 24px rgba(35,81,197,.13);
  --r:12px;--rs:8px;
}


*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .2s,color .2s}
.mono{font-family:'Montserrat',sans-serif}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── 상단바 ── */
.top-bar{background:var(--sidebar-bg);padding:0 18px;height:38px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(35,81,197,.25)}
.top-logo{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:900;color:#fff;letter-spacing:2px}
.top-right{display:flex;align-items:center;gap:12px}
.top-right span{font-size:11px;color:rgba(255,255,255,.6);font-family:'Montserrat',sans-serif}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);padding:2px 10px;border-radius:20px}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:#4ADE80;display:inline-block;box-shadow:0 0 6px #4ADE80}

/* ── 레이아웃 ── */
.app-wrap{display:flex;flex:1;overflow:hidden}

/* ── 사이드바 ── */
.sidebar{width:210px;min-width:210px;background:var(--sidebar-bg);display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(35,81,197,.15)}

.nav-section-label{font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.35);padding:14px 18px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;padding:9px 18px;font-size:13px;cursor:pointer;color:var(--sidebar-text);transition:all .15s;border-left:3px solid transparent;user-select:none;gap:8px}
.nav-item:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:var(--sidebar-active);border-left-color:#fff;font-weight:700}
.nav-badge{margin-left:auto;background:#FC4545;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;font-family:'Montserrat',sans-serif}
.sidebar-foot{padding:12px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.user-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.08)}
.user-av{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'Montserrat',sans-serif}
.user-name{font-size:12px;font-weight:700;color:#fff}
.user-role{font-size:10px;color:rgba(255,255,255,.4)}

/* ── 메인 ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 12px;background:var(--surface);border-bottom:2px solid var(--header-border);flex-shrink:0;box-shadow:var(--shadow)}
.page-title{font-size:17px;font-weight:900;color:var(--accent2);font-family:'Montserrat',sans-serif}
.page-sub{font-size:11px;color:var(--text3);margin-top:2px}
.content{padding:20px 24px;flex:1;overflow-y:auto}

/* ── 버튼 ── */
.btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:700;border:1px solid var(--border2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent2);box-shadow:0 2px 8px rgba(35,81,197,.25)}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface);color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--accent-l);color:var(--accent)}
.btn-tab{background:var(--surface);color:var(--text2);border:1px solid var(--border2)}
.btn-tab.active{background:var(--accent);color:#fff;border-color:var(--accent2)}
.btn-danger{background:#fee2e2;color:#c53030;border-color:#fca5a5}
.btn-danger:hover{background:#fca5a5}

/* ── 카드 ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);border-top:3px solid var(--accent)}

/* ══════════════════════════════════════
   업무 요청 현황 테이블
══════════════════════════════════════ */
.req-table{width:100%;border-collapse:collapse;font-size:13px}
.req-table th{
  padding:8px 12px;text-align:left;
  font-size:11px;font-weight:700;
  color:var(--text3);
  background:var(--surface2);
  border-bottom:2px solid var(--border);
  text-transform:uppercase;letter-spacing:.04em;
  white-space:nowrap;
}
.req-table th:first-child{border-radius:var(--rs) 0 0 0}
.req-table th:last-child{border-radius:0 var(--rs) 0 0}
.req-table td{
  padding:9px 12px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.req-table tr:last-child td{border-bottom:none}
.req-table tr:hover td{background:var(--accent-l)}
.req-table tr.emergency-row td{background:#fff5f5}
.req-table tr.done-row td{opacity:.5}
.req-assignee{
  font-weight:700;color:var(--text);
  white-space:nowrap;
}
.req-role{
  font-size:11px;color:var(--text3);
  margin-left:4px;font-weight:400;
}
.req-task{color:var(--text2)}
.req-date{
  font-size:11px;font-family:'Montserrat',sans-serif;
  color:var(--text3);white-space:nowrap;
}
.req-date.overdue{color:#E53E3E;font-weight:700}
.req-date.today{color:#F97316;font-weight:700}
.req-date.soon{color:#D69E2E;font-weight:700}
.req-check{
  width:15px;height:15px;border-radius:3px;
  border:1.5px solid var(--border2);
  background:transparent;cursor:pointer;
  appearance:none;transition:all .15s;
}
.req-check:checked{background:#38A169;border-color:#38A169}
.req-empty{
  text-align:center;padding:28px;
  color:var(--text3);font-size:13px;
}

/* ══════════════════════════════════════
   D-DAY 섹션
══════════════════════════════════════ */
.dday-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.dday-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);min-height:120px}
.dday-label{font-size:11px;font-weight:900;color:#fff;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;font-family:'Montserrat',sans-serif}
.dday-label.d0{background:#E53E3E}
.dday-label.d1{background:#F97316}
.dday-label.d2{background:#D69E2E}
.dday-label.d3{background:#2351c5}
.dday-task{font-size:12px;padding:5px 8px;border-radius:6px;margin-bottom:4px;display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;transition:all .15s}
.dday-task:hover{border-color:var(--accent);background:var(--accent-l)}
.dday-task.emergency{background:#fff0f0;border-color:#FC4545;color:#c53030}
.dday-empty{font-size:11px;color:var(--text3);padding:4px 0}

/* ══════════════════════════════════════
   통계 카드
══════════════════════════════════════ */
.stat-val{font-size:26px;font-weight:900;font-family:'Montserrat',sans-serif}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ══════════════════════════════════════
   하단 챗봇 바
══════════════════════════════════════ */
.bottom-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 22px;flex-shrink:0;box-shadow:0 -2px 10px rgba(35,81,197,.06)}
.chat-wrap{display:flex;gap:10px;align-items:center;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rs);padding:7px 12px;transition:border-color .15s}
.chat-wrap:focus-within{border-color:var(--accent)}
.chat-pre{font-size:10px;color:var(--text3);font-family:'Montserrat',sans-serif;white-space:nowrap}
.chat-in{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px}
.chat-in::placeholder{color:var(--text3)}
.chat-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;transition:background .15s}
.chat-btn:hover{background:var(--accent2)}

/* ══════════════════════════════════════
   토스트
══════════════════════════════════════ */
.toast-wrap{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:8px;animation:slideIn .2s ease;pointer-events:all;min-width:220px;box-shadow:var(--shadow-md)}
.toast.success{border-left:3px solid #38A169}
.toast.error{border-left:3px solid #E53E3E}
.toast.info{border-left:3px solid var(--accent)}
@keyframes slideIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ══════════════════════════════════════
   모달 공통
══════════════════════════════════════ */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(13,31,78,.5);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--r);width:520px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;animation:popIn .18s ease;box-shadow:var(--shadow-md);border:1px solid var(--border);overflow:hidden}
@keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{padding:16px 20px;background:var(--sidebar-bg);display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid rgba(255,255,255,.15)}
.modal-title{font-size:15px;font-weight:900;color:#fff;font-family:'Montserrat',sans-serif}
.modal-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.modal-close{width:26px;height:26px;border-radius:5px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:rgba(255,255,255,.2);color:#fff}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}

/* ══════════════════════════════════════
   업무 아이템
══════════════════════════════════════ */
.task-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--rs);border:1px solid var(--border);margin-bottom:6px;background:var(--surface);transition:all .15s}
.task-item:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(35,81,197,.08)}
.task-item.emergency{background:#fff0f0;border-color:#FC4545!important}
.task-chk{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;appearance:none;transition:all .15s}
.task-chk:checked{background:#38A169;border-color:#38A169}
.task-txt{font-size:13px;flex:1}
.task-txt.done{text-decoration:line-through;color:var(--text3)}
.task-date{font-size:10px;color:var(--text3);font-family:'Montserrat',sans-serif;flex-shrink:0}
.task-date.overdue{color:#E53E3E;font-weight:700}
.task-del{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0}
.task-del:hover{background:#fee2e2;color:#E53E3E}
.task-edit{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;flex-shrink:0}
.task-edit:hover{background:var(--accent-l);color:var(--accent)}
.emergency-badge{font-size:9px;background:#E53E3E;color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0}

/* ── 업무 추가 폼 ── */
.add-form{display:flex;gap:8px;margin-bottom:12px;padding:8px 10px;background:var(--surface2);border-radius:var(--rs);border:1.5px solid var(--border2)}
.add-form:focus-within{border-color:var(--accent)}
.add-in{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif}
.add-in::placeholder{color:var(--text3)}
.add-date{background:transparent;border:none;outline:none;color:var(--text3);font-size:11px;font-family:'Montserrat',sans-serif;cursor:pointer;width:110px}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5}

/* ── 필터 바 ── */
.filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.f-btn{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.f-btn.active,.f-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent2)}

/* ── 섹션 ── */
.section{display:none}
.section.active{display:block}

/* ══════════════════════════════════════
   아코디언 조직도
══════════════════════════════════════ */
.acc-dept{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--sidebar-bg);border-radius:var(--r);cursor:pointer;margin-bottom:4px;user-select:none;transition:all .15s;box-shadow:var(--shadow)}
.acc-dept:hover{opacity:.9}
.acc-dept.open{border-radius:var(--r) var(--r) 0 0;margin-bottom:0}
.acc-dept-name{font-size:13px;font-weight:900;color:#fff;font-family:'Montserrat',sans-serif;letter-spacing:.03em}
.acc-dept-arrow{color:rgba(255,255,255,.6);transition:transform .2s;font-size:11px}
.acc-dept.open .acc-dept-arrow{transform:rotate(90deg)}
.acc-dept-body{display:none;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);margin-bottom:10px;overflow:hidden}
.acc-dept-body.open{display:block}
.acc-team{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--accent-l);cursor:pointer;border-top:1px solid var(--border);user-select:none;transition:background .15s}
.acc-team:first-child{border-top:none}
.acc-team:hover,.acc-team.open{background:var(--surface2)}
.acc-team-name{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--accent)}
.acc-team-bar{width:3px;height:13px;background:var(--accent);border-radius:2px}
.acc-team-arrow{color:var(--accent);font-size:10px;transition:transform .2s}
.acc-team.open .acc-team-arrow{transform:rotate(90deg)}
.acc-team-right{display:flex;align-items:center;gap:6px}
.acc-team-count{font-size:10px;color:var(--text3);font-family:'Montserrat',sans-serif}
.acc-team-body{display:none;padding:8px 12px 10px;background:var(--surface)}
.acc-team-body.open{display:block}
.member-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:4px}
.member-row:hover{background:var(--accent-l);border-color:var(--border)}
.member-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative;font-family:'Montserrat',sans-serif}
.member-av .notif{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#FC4545;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface);font-family:'Montserrat',sans-serif;line-height:1;animation:popBadge .2s ease;box-shadow:0 1px 4px rgba(252,69,69,.5)}
@keyframes popBadge{from{transform:scale(0)}to{transform:scale(1)}}
.member-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.member-role{font-size:10px;color:var(--text3)}
.member-tasks{font-size:10px;font-family:'Montserrat',sans-serif;padding:2px 8px;border-radius:20px;background:var(--accent-l);color:var(--accent);border:1px solid var(--border2);flex-shrink:0;font-weight:600}

/* ── 공정 카드 ── */
.process-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.process-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.process-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.process-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.process-name{font-size:13px;font-weight:700;flex:1;color:var(--text)}

/* ══════════════════════════════════════
   편집 모달
══════════════════════════════════════ */
.edit-overlay{position:fixed;inset:0;z-index:600;background:rgba(13,31,78,.55);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);animation:fadeIn .15s ease}
.edit-box{background:var(--surface);border-radius:var(--r);width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);border:1px solid var(--border);animation:popIn .18s ease}
.edit-head{padding:14px 18px;background:var(--sidebar-bg);display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid rgba(255,255,255,.15);position:sticky;top:0}
.edit-body{padding:18px}
.edit-field{margin-bottom:14px}
.edit-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;display:block}
.edit-input{width:100%;padding:8px 10px;border:1.5px solid var(--border2);border-radius:var(--rs);font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface2);transition:border-color .15s}
.edit-input:focus{outline:none;border-color:var(--accent)}
.edit-textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border2);border-radius:var(--rs);font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface2);resize:vertical;min-height:80px;transition:border-color .15s}
.edit-textarea:focus{outline:none;border-color:var(--accent)}
.edit-row{display:flex;gap:10px}
.edit-foot{display:flex;justify-content:flex-end;gap:8px;padding-top:4px}
.color-palette{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.color-dot:hover{transform:scale(1.2)}
.color-dot.selected{border-color:var(--text);box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text)}
.color-dot.none{background:var(--surface2);border:2px dashed var(--border2)}
.emergency-check{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid #fca5a5;border-radius:var(--rs);background:#fff0f0;cursor:pointer}

    <div class="sidebar-foot">

        <div class="user-av">강민</div>

        </div>
      </div>
    </div>
  </nav>

  <div class="main">

    <!-- ══ 대시보드 ══ -->
    <div class="section active" id="section-dashboard">
      <div class="page-header">

      <div class="content">

          <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:14px;text-transform:uppercase;letter-spacing:.03em">업무 요청 현황</div>

        </div>
      </div>
    </div>

    <!-- ══ 조직도 ══ -->

      </div>
      <div class="content">
        <div id="orgPersonView"></div>
        <div id="orgProcessView" style="display:none"></div>
      </div>
    </div>

        <div id="cal-wrap" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)"></div>
      </div>
    </div>

    <!-- ══ 개인업무 ══ -->
    <div class="section" id="section-personal">

function findEntity(mid){
  if(mid==='personal')return{name:'개인',role:'',color:'#2351c5'};
  for(const h of HIERARCHY)for(const t of h.teams){const m=t.members.find(x=>x.id===mid);if(m)return m;}
  return PROCESS_DATA.find(p=>p.id===mid)||null;
}

function renderDash(){
  const today=ds();
  const d1=ds(1),d2=ds(2),d3=ds(3);
  const activeTasks=db.tasks.filter(t=>!t.done&&t.mid!=='personal');

  // D-DAY 섹션
  const buckets=[
    {label:'D-DAY',cls:'d0',tasks:activeTasks.filter(t=>t.date===today)},
    {label:'D-1',cls:'d1',tasks:activeTasks.filter(t=>t.date===d1)},
    {label:'D-2',cls:'d2',tasks:activeTasks.filter(t=>t.date===d2)},
    {label:'D-3',cls:'d3',tasks:activeTasks.filter(t=>t.date===d3)},
  ];
  document.getElementById('ddayGrid').innerHTML=buckets.map(b=>`
    <div class="dday-card">
      <span class="dday-label ${b.cls}">${b.label}</span>
      ${b.tasks.length===0
        ?'<div class="dday-empty">없음</div>'
        :b.tasks.map(t=>{
          const m=findEntity(t.mid);
          return `<div class="dday-task${t.emergency?' emergency':''}" onclick="openEdit('${t.id}','dash')">
            ${t.emergency?'<span style="font-size:10px">🚨</span>':''}
            <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.text}</span>
            <span style="font-size:10px;color:var(--text3);flex-shrink:0">${m?m.name:''}</span>
          </div>`;
        }).join('')}
    </div>`).join('');

  // 통계 카드
  const total=db.tasks.length;
  const done=db.tasks.filter(t=>t.done).length;
  const overdue=db.tasks.filter(t=>!t.done&&t.date<today).length;
  const emergency=db.tasks.filter(t=>!t.done&&t.emergency).length;
  document.getElementById('statCards').innerHTML=[
    {l:'전체 요청',v:total,c:'var(--accent)',s:'등록된 모든 업무 요청'},
    {l:'완료',v:done,c:'#38A169',s:`완료율 ${total?Math.round(done/total*100):0}%`},
    {l:'지연',v:overdue,c:'#E53E3E',s:'기한 초과 요청'},
    {l:'긴급',v:emergency,c:'#FC4545',s:'최우선순위 업무'},
  ].map((s,i)=>`
    <div class="card" style="border-top-color:${s.c}">
      <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.03em">${s.l}</div>
      <div class="stat-val" style="color:${s.c}">${s.v}</div>
      <div class="stat-sub">${s.s}</div>
    </div>`).join('');

  // 업무 요청 현황 테이블
  renderTaskTable();
}

function renderTaskTable(){
  const today=ds();
  const wrap=document.getElementById('taskTableWrap');
  if(!wrap) return;

  // 모든 업무 (개인 포함) 미완료 + 완료 전체, 마감일 오름차순
  const allTasks=[...db.tasks].sort((a,b)=>a.date.localeCompare(b.date));

  if(!allTasks.length){
    wrap.innerHTML='<div class="req-empty">등록된 업무가 없습니다</div>';
    return;
  }

  // 담당자 정보 가져오기
  function getAssigneeInfo(mid){
    if(mid==='personal') return {name:'강민범',role:'선임'};
    for(const h of HIERARCHY)
      for(const t of h.teams){
        const m=t.members.find(x=>x.id===mid);
        if(m) return {name:m.name.replace('(나)',''),role:m.role};
      }
    const p=PROCESS_DATA.find(x=>x.id===mid);
    if(p) return {name:p.name,role:'공정'};
    return {name:'-',role:''};
  }

  // 날짜 표시 스타일
  function dateClass(date,done){
    if(done) return '';
    if(date<today) return 'overdue';
    if(date===today) return 'today';
    const diff=(new Date(date)-new Date(today))/(1000*60*60*24);
    if(diff<=3) return 'soon';
    return '';
  }
  function dateLabel(t){
    if(t.startDate&&t.startDate!==t.date) return t.startDate+' ~ '+t.date;
    return t.date;
  }

  const rows=allTasks.map(t=>{
    const a=getAssigneeInfo(t.mid);
    const dc=dateClass(t.date,t.done);
    const isEmg=t.emergency&&!t.done;
    return `<tr class="${isEmg?'emergency-row':''}${t.done?' done-row':''}">
      <td>
        <input type="checkbox" class="req-check" ${t.done?'checked':''}
          onchange="toggleT('${t.id}');renderTaskTable();updateBadges();">
      </td>
      <td>
        <span class="req-assignee">${a.name}</span>
        ${a.role?`<span class="req-role">${a.role}</span>`:''}
      </td>
      <td class="req-task">
        ${isEmg?'<span style="font-size:10px;background:#E53E3E;color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;margin-right:4px">긴급</span>':''}
        ${t.color&&!t.emergency?`<span style="width:7px;height:7px;border-radius:50%;background:${t.color};display:inline-block;margin-right:4px;vertical-align:middle"></span>`:''}
        ${t.text}
        ${t.memo?`<span title="${t.memo}" style="color:var(--text3);cursor:help;margin-left:3px">📝</span>`:''}
      </td>
      <td>
        <span class="req-date ${dc}">${dateLabel(t)}</span>
      </td>
      <td>
        <button class="task-edit" onclick="openEdit('${t.id}','dash')" title="수정" style="margin-right:2px">✎</button>
        <button class="task-del" onclick="delT('${t.id}');renderTaskTable();updateBadges();">✕</button>
      </td>
    </tr>`;
  }).join('');

  wrap.innerHTML=`
    <table class="req-table">
      <thead>
        <tr>
          <th style="width:32px"></th>
          <th>담당자</th>
          <th>업무명</th>
          <th>일정</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderOrg(){
  let html='';
  HIERARCHY.forEach(h=>{
    const allM=h.teams.flatMap(t=>t.members);
    const tot=allM.reduce((a,m)=>a+taskCount(m.id),0);
    html+=`<div class="acc-dept" onclick="toggleDept(this)" data-id="${h.id}">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="acc-dept-name">${h.name}</span>
        <span style="font-size:10px;color:rgba(255,255,255,.45);font-family:'Montserrat',sans-serif">(${allM.length}명)</span>
        ${tot>0?`<span style="font-size:10px;background:#FC4545;color:#fff;padding:1px 7px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700">${tot}</span>`:''}
      </div>
      <span class="acc-dept-arrow">▶</span>
    </div>
    <div class="acc-dept-body" id="dept-${h.id}">`;
    h.teams.forEach(t=>{
      const tc=t.members.reduce((a,m)=>a+taskCount(m.id),0);
      html+=`<div class="acc-team" onclick="toggleTeam(this)" data-id="${t.id}">
        <div class="acc-team-name"><div class="acc-team-bar"></div>${t.name}</div>
        <div class="acc-team-right">
          ${tc>0?`<span style="font-size:10px;background:#FC4545;color:#fff;padding:1px 7px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700">${tc}</span>`:''}
          <span class="acc-team-count">${t.members.length}명</span>
          <span class="acc-team-arrow">▶</span>
        </div>
      </div>
      <div class="acc-team-body" id="team-${t.id}">`;
      t.members.forEach(m=>{
        const cnt=taskCount(m.id);

function getFinanceEvents(){
  return financeDates.map((fd,i)=>{
    let bg,border,text;
    if(fd.type==='both'){bg='#FDFFB6';border='#D69E2E';text='#7B5E00';}
    else if(fd.type==='salary'){bg='#BDE0FE';border='#2351c5';text='#0D3B8C';}
    else{bg='#FFD6A5';border='#F97316';text='#7C3A00';}
    return{id:`fin-${i}`,title:fd.label,start:fd.date,allDay:true,backgroundColor:bg,borderColor:border,textColor:text,extendedProps:{fixed:true}};
  });
}

function renderCal(){
  const c=document.getElementById('cal-wrap');
  if(calInst){calInst.destroy();calInst=null;}c.innerHTML='';

  const taskEvents=db.tasks.map(t=>{
    const m=findEntity(t.mid);
    // 긴급 → 항상 빨강
    if(t.emergency){
      return{id:t.id,title:t.text,start:t.startDate||t.date,
        backgroundColor:'#FF0000',borderColor:'#CC0000',textColor:'#fff',
        extendedProps:{taskId:t.id}};
    }
    // 색상 미지정 시 회색
    const baseColor=t.color||'#D4D4D4';
    const ev={id:t.id,title:t.text,start:t.startDate||t.date,
      backgroundColor:baseColor,borderColor:baseColor,textColor:'#1A202C',
      extendedProps:{taskId:t.id}};
    if(t.startDate&&t.startDate!==t.date){
      const endD=new Date(t.date);endD.setDate(endD.getDate()+1);
      ev.end=endD.toISOString().slice(0,10);
    }
    return ev;
  });

  calInst=new FullCalendar.Calendar(c,{
    initialView:'dayGridMonth',locale:'ko',
    timeZone:'local',
    headerToolbar:{left:'prev,next today',center:'title',right:'dayGridMonth,dayGridWeek'},
    events:taskEvents,
    dayCellDidMount(info){
      // FullCalendar는 UTC 기준이므로 로컬 날짜로 변환
      const d=info.date;
      // timeZone:'local' 설정 시 로컬 기준으로 날짜 처리
      const str=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const dow=d.getDay();
      const numEl=info.el.querySelector('.fc-daygrid-day-number');
      if(!numEl)return;
      if(HOLIDAYS[str]){
        numEl.style.color='#E53E3E';numEl.style.fontWeight='700';
        const lbl=document.createElement('span');
        lbl.textContent=HOLIDAYS[str];
        lbl.style.cssText='font-size:9px;color:#E53E3E;display:block;line-height:1;margin-top:1px;font-weight:500';
        numEl.appendChild(lbl);
      }else if(dow===0){numEl.style.color='#E53E3E';}
      else if(dow===6){numEl.style.color='#3461d4';}
    },
    datesSet(){
      calInst.getEvents().forEach(ev=>{if(ev.extendedProps&&ev.extendedProps.fixed)ev.remove();});
      getFinanceEvents().forEach(ev=>calInst.addEvent(ev));
    },
    eventClick(info){
      if(info.event.extendedProps&&info.event.extendedProps.fixed)return;
      const tid=info.event.extendedProps.taskId||info.event.id;
      openEdit(tid,'calendar');
    },
    height:'auto'
  });
  calInst.render();
}

/* ══════════════════════════════════════
   챗봇 파서
══════════════════════════════════════ */
function curYear(){return new Date().getFullYear();}
function tokenToDate(str){
  const y=curYear();let m;
  m=str.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=str.match(/^(\d{1,2})월\s*(\d{1,2})일?$/);if(m)return`${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  m=str.match(/^(\d{1,2})[./](\d{1,2})$/);if(m)return`${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  if(/오늘/.test(str))return ds(0);if(/내일/.test(str))return ds(1);if(/다음\s*주/.test(str))return ds(7);
  return null;
}
const COLOR_MAP=[
  {kw:'빨간색',hex:'#FFADAD'},{kw:'빨강',hex:'#FFADAD'},{kw:'빨간',hex:'#FFADAD'},
  {kw:'주황색',hex:'#FFD6A5'},{kw:'주황',hex:'#FFD6A5'},
  {kw:'노란색',hex:'#FDFFB6'},{kw:'노랑',hex:'#FDFFB6'},{kw:'노란',hex:'#FDFFB6'},
  {kw:'초록색',hex:'#CAFFBF'},{kw:'초록',hex:'#CAFFBF'},{kw:'녹색',hex:'#CAFFBF'},
  {kw:'하늘색',hex:'#BDE0FE'},{kw:'하늘',hex:'#BDE0FE'},
  {kw:'파란색',hex:'#A0C4FF'},{kw:'파랑',hex:'#A0C4FF'},{kw:'파란',hex:'#A0C4FF'},
  {kw:'보라색',hex:'#C8B6FF'},{kw:'보라',hex:'#C8B6FF'},
  {kw:'회색',hex:'#D4D4D4'},
  {kw:'분홍색',hex:'#FFB3C6'},{kw:'분홍',hex:'#FFB3C6'},{kw:'핑크',hex:'#FFB3C6'},
  {kw:'복숭아색',hex:'#FFCBA4'},{kw:'복숭아',hex:'#FFCBA4'},
  {kw:'민트색',hex:'#B5EAD7'},{kw:'민트',hex:'#B5EAD7'},
  {kw:'라벤더색',hex:'#E2C9FB'},{kw:'라벤더',hex:'#E2C9FB'},
  {kw:'살구색',hex:'#FFDAC1'},{kw:'살구',hex:'#FFDAC1'},
  {kw:'연두색',hex:'#C7F2A4'},{kw:'연두',hex:'#C7F2A4'},
  {kw:'코랄색',hex:'#FFBFB5'},{kw:'코랄',hex:'#FFBFB5'},
];

function parseChat(){
  const raw=document.getElementById('chatIn').value.trim();if(!raw)return;
  let text=raw;

  // 긴급 키워드
  let isEmergency=false;
  if(text.includes('긴급')){isEmergency=true;text=text.replace(/긴급/g,'').trim();}

  // 기간 날짜
  let startDate=null,endDate=null;
  const patA=/(\d{1,2})월\s*(\d{1,2})일?\s*(?:부터|~|에서)\s*(\d{1,2})월\s*(\d{1,2})일?(?:\s*까지)?/;
  const patB=/(\d{4}-\d{2}-\d{2})\s*(?:부터|~|에서)\s*(\d{4}-\d{2}-\d{2})(?:\s*까지)?/;
  let rm=text.match(patA);
  if(rm){const y=curYear();startDate=`${y}-${rm[1].padStart(2,'0')}-${rm[2].padStart(2,'0')}`;endDate=`${y}-${rm[3].padStart(2,'0')}-${rm[4].padStart(2,'0')}`;text=text.replace(rm[0],'').replace(/부터|까지|에서/g,'').trim();}
  else{rm=text.match(patB);if(rm){startDate=rm[1];endDate=rm[2];text=text.replace(rm[0],'').trim();}}

  // 단일 날짜
  let date=ds(1);
  if(endDate){date=endDate;}
  else{
    if(/오늘/.test(text)){date=ds(0);text=text.replace(/오늘/g,'').trim();}
    else if(/내일/.test(text)){date=ds(1);text=text.replace(/내일/g,'').trim();}
    else if(/다음\s*주/.test(text)){date=ds(7);text=text.replace(/다음\s*주/g,'').trim();}
    else{
      const mKo=text.match(/(\d{1,2})월\s*(\d{1,2})일?/);
      if(mKo){const p=tokenToDate(mKo[0]);if(p){date=p;text=text.replace(mKo[0],'').trim();}}
      else{const mF=text.match(/\d{4}-\d{2}-\d{2}/);if(mF){date=mF[0];text=text.replace(mF[0],'').trim();}}
    }
  }

  // 색상
  let taskColor=null;
  for(const{kw,hex}of COLOR_MAP){if(text.includes(kw)){taskColor=hex;text=text.split(kw).join('').replace(/\s+/g,' ').trim();break;}}

  // 이름/공정 (순서 무관)
  let mid='personal',mName='개인';
  const allMem=[];
  HIERARCHY.forEach(h=>h.teams.forEach(t=>t.members.forEach(m=>allMem.push({id:m.id,name:m.name.replace('(나)','')}))));
  PROCESS_DATA.forEach(p=>allMem.push({id:p.id,name:p.name}));
  allMem.sort((a,b)=>b.name.length-a.name.length);
  const honorifics=['본부장','팀장','실장','파트장','수석','책임','선임','님','씨'];
  for(const e of allMem){
    const idx=text.indexOf(e.name);
    if(idx!==-1){
      mid=e.id;mName=e.name;let endIdx=idx+e.name.length;
      const rest=text.slice(endIdx).trimStart();
      for(const h of honorifics){if(rest.startsWith(h)){endIdx+=text.slice(endIdx).length-rest.slice(h.length).trimStart().length;break;}}
      text=(text.slice(0,idx)+' '+text.slice(endIdx)).trim();break;
    }
  }
  if(mid==='personal'){for(const kw of['나','본인','관리자']){if(text===kw||text.startsWith(kw+' ')||text.includes(' '+kw+' ')||text.endsWith(' '+kw)){text=text.replace(new RegExp(`(^|\\s)${kw}(\\s|$)`),' ').trim();break;}}}

  text=text.replace(/요청\s*(?:했|하래|해|함|드림)?/g,'').replace(/하래/g,'').replace(/\s+/g,' ').trim();
  if(!text){toast('업무 내용을 입력해주세요','error');return;}

  const task={id:uid(),mid,text,date,done:false};
  if(startDate&&startDate!==date)task.startDate=startDate;
  if(taskColor)task.color=taskColor;
  if(isEmergency)task.emergency=true;

  db.tasks.push(task);save();
  document.getElementById('chatIn').value='';
  const dl=(startDate&&startDate!==date)?`${startDate}~${date}`:date;
  toast(`[${mName}] ${text} (${dl})${isEmergency?' 🚨':''}${taskColor?' 🎨':''} 등록됨`,'success');
  updateBadges();
  if(cur==='dashboard')renderDash();
  if(cur==='org')renderOrg();
  if(cur==='personal')renderPers();
  if(cur==='calendar')renderCal();
}
document.getElementById('chatIn').addEventListener('keydown',e=>{if(e.key==='Enter')parseChat();});

function toast(msg,type='info'){
  const w=document.getElementById('toastWrap');
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`<span>${msg}</span>`;w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},2800);
}
